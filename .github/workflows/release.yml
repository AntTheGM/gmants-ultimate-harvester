name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Substitute version and URLs in module.json
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          REPO="${{ github.repository }}"

          # Update version
          jq --arg v "$VERSION" '.version = $v' module.json > tmp.json && mv tmp.json module.json

          # Update manifest URL (always points to latest)
          jq --arg url "https://github.com/${REPO}/releases/latest/download/module.json" \
            '.manifest = $url' module.json > tmp.json && mv tmp.json module.json

          # Update download URL (points to this specific version)
          jq --arg url "https://github.com/${REPO}/releases/download/v${VERSION}/module.zip" \
            '.download = $url' module.json > tmp.json && mv tmp.json module.json

          echo "Built module.json for version ${VERSION}:"
          cat module.json

      - name: Create module.zip
        run: |
          zip -r module.zip . \
            -x ".git/*" \
            -x ".github/*" \
            -x ".gitignore" \
            -x ".gitattributes" \
            -x "CLAUDE.md" \
            -x "README.md" \
            -x "CONTRIBUTING.md" \
            -x "CHANGELOG.md" \
            -x "docs/*" \
            -x "tools/*" \
            -x "reference/*" \
            -x "node_modules/*" \
            -x "package.json" \
            -x "package-lock.json" \
            -x ".eslintrc*" \
            -x "eslint.config.*" \
            -x "deploy.sh" \
            -x "packs/_source/*" \
            -x "packs/**/LOCK" \
            -x "packs/**/LOG" \
            -x "packs/**/LOG.old" \
            -x "*.log" \
            -x ".DS_Store" \
            -x "Thumbs.db"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            module.json
            module.zip
          generate_release_notes: true
